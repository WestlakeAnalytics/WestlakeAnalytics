<!DOCTYPE html>
<html lang="en-GB" class="page-hero-only">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Westlake Analytics — Coming soon</title>
    <meta
      name="description"
      content="Westlake Analytics — new things coming soon. Data visualisation, Tableau, and storytelling from Chris Westlake."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="hero-backdrop" id="hero-backdrop" aria-hidden="true">
      <div class="hero-backdrop__logos" id="hero-backdrop-logos"></div>
    </div>

    <section class="viewport-section viewport-section--hero entry-page" id="entry-page">
      <div class="entry-page__inner">
        <div class="entry-hero-stack">
          <div class="entry-hero-stack__core">
            <div class="entry-brand">
              <a class="logo-title logo-title--hero" href="https://www.westlakeanalytics.com/">
                <span class="logo-title__text">Westlake Analytics</span>
              </a>
            </div>

            <main class="entry-main">
              <div class="wrap">
                <h1 class="hero-rotating-title" aria-label="where analytics becomes engaging, actionable, beautiful, or fun.">
                  <span class="hero-rotating-title__static">where analytics becomes</span>
                  <span class="hero-rotating-title__roller-outer"
                    ><span class="hero-rotating-title__roller" id="hero-roller"
                      ><span class="hero-rotating-title__roller-line">engaging</span
                      ><span class="hero-rotating-title__roller-line">actionable</span
                      ><span class="hero-rotating-title__roller-line">beautiful</span
                      ><span class="hero-rotating-title__roller-line">fun</span
                      ><span class="hero-rotating-title__roller-line" aria-hidden="true">engaging</span></span
                    ></span
                  >
                </h1>
              </div>

              <div class="hero-info-banner-wrap">
                <p class="hero-info-banner" role="status">
                  <span class="hero-info-banner__icon" aria-hidden="true">i</span>
                  <span class="hero-info-banner__text">New website coming soon</span>
                </p>
              </div>
            </main>
          </div>
        </div>
      </div>
    </section>

    <script src="main.js" defer></script>
  </body>
</html>
